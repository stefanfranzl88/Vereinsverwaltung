<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dorfgemeinschaft Gödersdorf – Vereinsverwaltung (Prototyp)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Instrument+Sans:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#F3F5F1; --surface:#FFFFFF; --ink:#1D2823; --muted:#67736B;
  --pine:#1F5741; --pine-deep:#12382A; --pine-soft:#E3EEE7;
  --amber:#D9A441; --amber-soft:#F8EDD6; --red:#B0432E; --red-soft:#F6E3DE;
  --line:#E0E5DF; --radius:14px; --shadow:0 1px 3px rgba(20,40,30,.08),0 6px 18px rgba(20,40,30,.05);
  --font-display:"Bricolage Grotesque",sans-serif; --font-body:"Instrument Sans",sans-serif; --font-mono:"Spline Sans Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5}
button{font-family:inherit;font-size:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink)}
h1,h2,h3{font-family:var(--font-display);letter-spacing:-.01em}
.mono{font-family:var(--font-mono)}
:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------- Login ---------- */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:linear-gradient(160deg,var(--pine-deep) 0%,var(--pine) 70%,#2C6B52 100%)}
.login-card{background:var(--surface);border-radius:20px;box-shadow:var(--shadow);padding:32px 28px;max-width:420px;width:100%}
.login-brand{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.brand-mark{width:52px;height:52px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid var(--line)}
.brand-mark img{width:100%;height:100%;object-fit:contain}
.login-card h1{font-size:26px;font-weight:700}
.login-sub{color:var(--muted);margin:4px 0 22px}
.login-card label{display:block;font-size:13px;font-weight:600;margin:14px 0 6px}
.login-card select,.login-card input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:#FBFCFA}
.hint{font-size:12.5px;color:var(--muted);margin-top:6px}
.btn{border:none;border-radius:10px;padding:11px 18px;font-weight:600;background:var(--pine);color:#fff;transition:background .15s}
.btn:hover{background:var(--pine-deep)}
.btn.block{width:100%;margin-top:20px;padding:13px}
.btn.ghost{background:transparent;color:var(--pine);border:1px solid var(--line)}
.btn.ghost:hover{background:var(--pine-soft)}
.btn.small{padding:7px 12px;font-size:13.5px;border-radius:8px}
.btn.danger{background:var(--red)}
.btn.amber{background:var(--amber);color:var(--pine-deep)}

/* ---------- App-Shell ---------- */
#app{display:none;min-height:100vh}
.topbar{position:sticky;top:0;z-index:40;background:var(--pine-deep);color:#fff;display:flex;align-items:center;gap:12px;padding:10px 16px}
.topbar .brand-mark{width:36px;height:36px;border-radius:9px;background:#fff;border:none}
.topbar-title{font-family:var(--font-display);font-weight:700;font-size:17px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.role-switch{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border-radius:999px;padding:4px 6px 4px 12px}
.role-switch span{font-size:12px;opacity:.85}
.role-switch select{background:var(--amber);border:none;border-radius:999px;padding:5px 10px;font-weight:600;font-size:13px;color:var(--pine-deep)}
.logout{background:none;border:none;color:#fff;opacity:.8;font-size:13px;padding:6px}
.layout{display:flex;max-width:1240px;margin:0 auto}
.sidenav{width:216px;flex-shrink:0;padding:20px 12px;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto}
.sidenav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;padding:10px 12px;border-radius:10px;color:var(--ink);font-weight:500;margin-bottom:2px}
.sidenav button .ico{width:20px;text-align:center}
.sidenav button:hover{background:#E9EEE7}
.sidenav button.active{background:var(--pine);color:#fff}
.sidenav .badge{margin-left:auto;background:var(--amber);color:var(--pine-deep);font-size:11.5px;font-weight:700;border-radius:999px;padding:1px 7px}
main{flex:1;padding:24px 20px 90px;min-width:0}
.view-title{font-size:24px;font-weight:700;margin-bottom:4px}
.view-sub{color:var(--muted);margin-bottom:20px;font-size:14px}

/* ---------- Bausteine ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
.card h3{font-size:16px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
.stat .k{font-size:12.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.stat .v{font-family:var(--font-mono);font-size:22px;font-weight:600;margin-top:2px}
.stat .v.pos{color:var(--pine)} .stat .v.neg{color:var(--red)}
.pill{display:inline-block;font-size:12px;font-weight:600;border-radius:999px;padding:2px 9px}
.pill.green{background:var(--pine-soft);color:var(--pine)}
.pill.amber{background:var(--amber-soft);color:#8A6414}
.pill.red{background:var(--red-soft);color:var(--red)}
.pill.grey{background:#ECEFEA;color:var(--muted)}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--line)}
td{padding:10px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
.amount{font-family:var(--font-mono);font-weight:600;text-align:right;white-space:nowrap}
.amount.in{color:var(--pine)} .amount.out{color:var(--red)}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.spacer{flex:1}
.search{padding:9px 12px;border:1px solid var(--line);border-radius:10px;background:var(--surface);min-width:200px}
.list-item{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--line)}
.list-item:last-child{border-bottom:none}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--pine-soft);color:var(--pine);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.meta{font-size:12.5px;color:var(--muted)}
.date-chip{flex-shrink:0;width:52px;border-radius:10px;background:var(--pine-soft);text-align:center;padding:6px 0}
.date-chip .d{font-family:var(--font-mono);font-weight:600;font-size:17px;color:var(--pine)}
.date-chip .m{font-size:11px;text-transform:uppercase;color:var(--pine);font-weight:700}
.bar-track{background:#ECEFEA;border-radius:999px;height:10px;overflow:hidden;margin-top:4px}
.bar-fill{height:100%;background:var(--pine);border-radius:999px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid label,.stack label{display:block;font-size:13px;font-weight:600;margin-bottom:4px}
.form-grid input,.form-grid select,.stack input,.stack select,.stack textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:#FBFCFA}
.stack>div{margin-bottom:12px}
textarea{resize:vertical;min-height:80px}
.notice{background:var(--amber-soft);border:1px solid #EBD9AE;border-radius:10px;padding:10px 12px;font-size:13.5px;margin-bottom:14px}
.upload-zone{border:2px dashed var(--line);border-radius:12px;padding:22px;text-align:center;color:var(--muted);background:#FBFCFA}
.upload-zone.hasfile{border-color:var(--pine);color:var(--pine);background:var(--pine-soft)}
.chat-box{display:flex;flex-direction:column;gap:10px;max-height:420px;overflow-y:auto;padding:4px 2px 12px}
.msg{max-width:78%;padding:9px 13px;border-radius:14px;background:#ECEFEA;font-size:14px}
.msg .who{font-size:11.5px;font-weight:700;color:var(--pine);margin-bottom:2px}
.msg.mine{align-self:flex-end;background:var(--pine);color:#fff}
.msg.mine .who{color:var(--amber)}
.msg .t{display:block;font-size:10.5px;opacity:.6;margin-top:3px;text-align:right}
.perm-grid td,.perm-grid th{padding:6px 5px;font-size:12px}
.perm-grid td:first-child{font-weight:500;min-width:190px;font-size:12.5px}
.perm-grid th{font-size:10.5px;white-space:nowrap}
.check{color:var(--pine);font-weight:700}.cross{color:#C6CCC5}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--pine-deep);color:#fff;padding:11px 18px;border-radius:999px;font-size:14px;box-shadow:var(--shadow);z-index:60;animation:pop .2s}
@keyframes pop{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%)}}
.avatar-wrap{position:relative;flex-shrink:0}
.medal{position:absolute;bottom:-5px;right:-7px;background:linear-gradient(180deg,#F5D46F,#C6952A);color:#5C430D;font-size:10px;font-weight:800;border-radius:50%;width:21px;height:21px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.task-done{text-decoration:line-through;color:var(--muted)}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--surface)}
.seg button{border:none;background:none;padding:7px 12px;font-size:13px;font-weight:600;color:var(--muted)}
.seg button.on{background:var(--pine);color:#fff}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal .dow{font-size:11px;text-transform:uppercase;color:var(--muted);text-align:center;font-weight:700;padding:4px 0}
.cal .day{min-height:66px;border:1px solid var(--line);border-radius:8px;padding:4px;font-size:11px;background:#FBFCFA;overflow:hidden}
.cal .day .n{font-family:var(--font-mono);font-size:11px;color:var(--muted)}
.cal .day.other{opacity:.35}
.cal .day.today{border-color:var(--amber);background:var(--amber-soft)}
.cal .ev{background:var(--pine);color:#fff;border-radius:5px;padding:1px 4px;margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cal .dot{display:none}
@media (max-width:840px){.cal .day{min-height:44px}.cal .ev{display:none}.cal .dot{display:block;width:7px;height:7px;border-radius:50%;background:var(--pine);margin:3px auto 0}}
.consent-overlay{position:fixed;inset:0;background:rgba(18,56,42,.55);z-index:80;display:flex;align-items:center;justify-content:center;padding:16px}
.consent-card{background:var(--surface);border-radius:18px;max-width:560px;width:100%;max-height:88vh;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.consent-card .head{padding:18px 22px 10px}
.consent-card .body{overflow-y:auto;padding:0 22px;font-size:13.5px;color:#3A443E}
.consent-card .body h4{margin:12px 0 4px;font-size:13.5px}
.consent-card .foot{padding:14px 22px 18px;border-top:1px solid var(--line)}
.consent-check{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:14px;cursor:pointer}
.consent-check input{margin-top:3px;width:17px;height:17px;accent-color:var(--pine);flex-shrink:0}
.demo-tag{position:fixed;top:64px;right:-34px;transform:rotate(45deg);background:var(--amber);color:var(--pine-deep);font-size:11px;font-weight:700;padding:4px 40px;z-index:50;pointer-events:none;letter-spacing:.08em}

/* ---------- Mobile ---------- */
.bottomnav{display:none}
@media (max-width:840px){
  .sidenav{display:none}
  .grid2,.grid3,.form-grid{grid-template-columns:1fr}
  main{padding:18px 14px 96px}
  .topbar-title{font-size:15px}
  .role-switch span{display:none}
  .table-wrap{overflow-x:auto}
  .bottomnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--line);z-index:40;overflow-x:auto;padding:4px 4px calc(4px + env(safe-area-inset-bottom))}
  .bottomnav button{flex:1;min-width:64px;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 4px;font-size:10.5px;color:var(--muted);font-weight:600}
  .bottomnav button.active{color:var(--pine)}
  .bottomnav .ico{font-size:18px}
}
</style>
</head>

const esc = s => String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function toast(msg){const t=document.createElement("div");t.className="toast";t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2400);}
const isVorstand = () => currentUser && ["obmann","obmann_stv","schriftfuehrer","schriftf_stv","kassier","kassier_stv","admin"].includes(currentUser.role);

const avatarHtml = (m,size=36) => m&&m.photo

const memberByName = n => members.find(m=>m.name===n);
const PTS = {Sitzung:1,Aufbau:2,Abbau:2,Veranstaltung:2,Sonstiges:1};
const hasChip = mid => keyChips.find(k=>k.mid===mid);
const daysSince = d => Math.round((new Date("2026-07-12")-new Date(d))/86400000);
function memberPoints(mid){
  let sitz=0,eins=0,pts=0;
  protocols.forEach(p=>{if((p.att||[]).includes(mid)){pts+=PTS[p.type]||1;if(p.type==="Sitzung")sitz++;else eins++;}});
  return {sitz,eins,pts};
}

/* ---------- Login / Rollenwechsel ---------- */
function initLogin(){
  document.getElementById("loginUser").innerHTML =

const consented = new Set(); // im echten Produkt: in der Datenbank mit Zeitstempel & Version gespeichert
function login(){
  const id=+document.getElementById("loginUser").value;

  doLogin(id);
}

function ckChange(){
  const ok=document.getElementById("ck1").checked&&document.getElementById("ck2").checked;
  const b=document.getElementById("consentBtn");
  b.disabled=!ok; b.style.opacity=ok?"1":".45";
}
function acceptConsent(id){
  consented.add(id);
  document.getElementById("consentOverlay").remove();
  doLogin(id);
  toast("Zustimmung gespeichert (Version 1.0, "+new Date().toLocaleDateString("de-AT")+")");
}
function doLogin(id){
  currentUser=users.find(u=>u.id===id);
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("roleSwitcher").innerHTML =
    users.map(u=>`<option value="${u.id}" ${u.id===id?"selected":""}>${esc(u.name.split(" ")[0])} (${ROLES[u.role].label})</option>`).join("");
  currentView="dashboard"; render();
}
function switchUser(id){
  currentUser=users.find(u=>u.id===+id);
  if(NAV.find(n=>n.id===currentView)?.perm && !can(NAV.find(n=>n.id===currentView).perm)) currentView="dashboard";
  render(); toast("Ansicht gewechselt: "+ROLES[currentUser.role].label);
}
function logout(){
  currentUser=null;
  document.getElementById("app").style.display="none";
  document.getElementById("loginScreen").style.display="flex";
}
function go(v){currentView=v;render();window.scrollTo({top:0});}

/* ---------- Navigation & Render ---------- */
function render(){
  const openInv = invoices.filter(i=>i.status==="offen").length;
  const navHtml = NAV.filter(n=>!n.perm||can(n.perm)).map(n=>`
    <button class="${currentView===n.id?"active":""}" onclick="go('${n.id}')">
      <span class="ico">${n.ico}</span>${n.label}
      ${n.id==="rechnungen"&&can("invoice.approve")&&openInv?`<span class="badge">${openInv}</span>`:""}
    </button>`).join("");
  document.getElementById("sideNav").innerHTML=navHtml;
  document.getElementById("bottomNav").innerHTML =
    NAV.filter(n=>!n.perm||can(n.perm)).map(n=>`
      <button class="${currentView===n.id?"active":""}" onclick="go('${n.id}')">
        <span class="ico">${n.ico}</span>${n.label}
      </button>`).join("");
  document.getElementById("main").innerHTML = VIEWS[currentView]();
}

    body:document.getElementById("nwBody").value,photo:pendingNewsPhoto,expires:exp});

    <h3>Mitglieder A–Z</h3>
    <div class="table-wrap"><table>${head}${normal.map(row).join("")||`<tr><td colspan="5" class="meta">Keine Treffer.</td></tr>`}</table></div>

function editDekade(){
  const d=prompt("Aktuelle Funktionsperiode des Vorstands:",clubInfo.dekade); if(!d)return;
  clubInfo.dekade=d; render(); toast("Funktionsperiode aktualisiert");
}
function setPhoto(inp,id){
  const file=inp.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=()=>{members.find(m=>m.id===id).photo=r.result;render();toast("Profilbild aktualisiert");};
  r.readAsDataURL(file);
}
function addMember(){
  const n=prompt("Name des neuen Mitglieds:"); if(!n)return;
  members.push({id:Date.now(),name:n,funktion:null,admin:false,email:"–",tel:"–",joined:"2026-07-12",status:"aktiv",photo:null});
  render(); toast("Mitglied angelegt");
}
function editMember(id){
  const m=members.find(x=>x.id===id);
  const n=prompt("Name bearbeiten:",m.name); if(!n)return;
  m.name=n;
  const f=prompt("Funktion (leer = normales Mitglied):\n"+FUNK_ORDER.join(" / "),m.funktion||"");
  m.funktion=f&&FUNK_ORDER.includes(f)?f:(f===""?null:m.funktion);
  render(); toast("Gespeichert");
}

const ccSums = id => {
  const tx=transactions.filter(t=>t.cc===id);
  const ein=tx.filter(t=>t.type==="in").reduce((s,t)=>s+t.amount,0);
  const aus=tx.filter(t=>t.type==="out").reduce((s,t)=>s+t.amount,0);
  return {ein,aus,erg:ein-aus,count:tx.length};
};
const tx2026 = () => transactions.filter(t=>t.date.startsWith("2026"));
const nextOpenMonth = () => {
  const [y,m]=clubInfo.lastMonthClosed.split("-").map(Number);
  return m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,"0")}`;
};
const monthLabel = ym => new Date(ym+"-01T00:00").toLocaleDateString("de-AT",{month:"long",year:"numeric"});
const monthCloseDue = () => {
  const om=nextOpenMonth();
  const [y,m]=om.split("-").map(Number);
  const remind=`${m===12?y+1:y}-${String(m===12?1:m+1).padStart(2,"0")}-05`;
  return "2026-07-12">=remind ? om : null;
};
VIEWS.kassa = () => kassaCC!==null ? kassaDetail() : kassaMonat ? monatView() : kassaAbschluss ? abschlussView() : kassaOverview();

function belegIcon(t){

  return ` <a href="#" title="Beleg: ${esc(t.beleg.name)}" onclick="showBeleg(${t.id});return false" style="text-decoration:none">📎</a>`;
}
function showBeleg(id){
  const t=transactions.find(x=>x.id===id);
  if(!t||!t.beleg)return;
  if(!t.beleg.data){toast("Demo-Beleg „"+t.beleg.name+"“ – kein Original hinterlegt");return;}
  const ov=document.createElement("div");
  ov.className="consent-overlay";
  ov.onclick=()=>ov.remove();
  const isImg=t.beleg.data.startsWith("data:image");
  ov.innerHTML=`<div class="consent-card" style="max-width:680px" onclick="event.stopPropagation()">

/* --- Jahresvergleich wiederkehrender Events --- */
function vergleichCard(){
  const groups={};
  costCenters.forEach(c=>{
    const m=c.name.match(/^(.*)\s(20\d\d)$/);
    if(!m)return;
    (groups[m[1]]=groups[m[1]]||[]).push({year:m[2],cc:c.id});
  });
  const rec=Object.entries(groups).filter(([,v])=>v.length>=2);
  if(!rec.length)return "";
  return `<div class="card">
    <h3>📈 Jahresvergleich wiederkehrender Events</h3>
    ${rec.map(([base,years])=>{
      const rows=years.sort((a,b)=>a.year.localeCompare(b.year)).map(y=>({...y,...ccSums(y.cc)}));
      const max=Math.max(1,...rows.map(r=>Math.max(r.ein,r.aus)));
      return `<div style="margin-bottom:18px">
        <b style="font-family:var(--font-display)">${esc(base)}</b>
        <div class="table-wrap"><table>
          <tr><th>Jahr</th><th style="text-align:right">Einnahmen</th><th style="text-align:right">Ausgaben</th><th style="text-align:right">Ergebnis</th><th style="min-width:140px">Verlauf</th></tr>
          ${rows.map((r,i)=>{
            const prev=i>0?rows[i-1]:null;
            const delta=prev&&prev.erg!==0?r.erg-prev.erg:null;
            return `<tr>
              <td class="mono">${r.year}${r.count===0?' <span class="pill grey">läuft noch</span>':""}</td>
              <td class="amount in">+ ${eur(r.ein)}</td>
              <td class="amount out">− ${eur(r.aus)}</td>
              <td class="amount" style="color:${r.erg>=0?"var(--pine)":"var(--red)"}">${r.erg>=0?"+":"−"} ${eur(Math.abs(r.erg))}
                ${delta!==null?`<div class="meta">${delta>=0?"▲":"▼"} ${eur(Math.abs(delta))} ggü. Vorjahr</div>`:""}</td>
              <td><div class="bar-track" style="height:7px;margin:3px 0"><div class="bar-fill" style="width:${r.ein/max*100}%"></div></div>
                  <div class="bar-track" style="height:7px"><div class="bar-fill" style="width:${r.aus/max*100}%;background:var(--red)"></div></div></td>
            </tr>`;}).join("")}
        </table></div>
      </div>`;}).join("")}
    <p class="meta">Grün = Einnahmen, Rot = Ausgaben. Die Zuordnung erfolgt automatisch über gleichnamige Kostenstellen mit Jahreszahl (z. B. „Jahreskirchtag 2025" / „… 2026").</p>
  </div>`;
}

    <button class="btn ghost small" onclick="window.print()">🖨 Drucken / PDF</button>
  </div>
  <p class="meta" style="margin-top:10px">Mit dem Export gilt ${monthLabel(om)} als abgeschlossen – die Erinnerung verschwindet und der nächste offene Monat rückt nach.</p>`;

async function exportMonat(om){
  const start=1250;
  const before=tx2026().filter(t=>t.date<om+"-01");
  const uebertrag=start+before.reduce((s,t)=>s+(t.type==="in"?t.amount:-t.amount),0);
  const mtx=transactions.filter(t=>t.date.startsWith(om)).sort((a,b)=>a.date.localeCompare(b.date));
  const ein=mtx.filter(t=>t.type==="in").reduce((s,t)=>s+t.amount,0);
  const aus=mtx.filter(t=>t.type==="out").reduce((s,t)=>s+t.amount,0);
  const aoa=[["Monatsabschluss "+monthLabel(om)+" – Dorfgemeinschaft Gödersdorf"],[],
    ["Übertrag Vormonat","","","",uebertrag],[],
    ["Datum","Buchungstext","Kategorie","Kostenstelle","Einnahme","Ausgabe","Beleg"]];
  mtx.forEach(t=>aoa.push([fdate(t.date),t.text,t.cat,ccName(t.cc),t.type==="in"?t.amount:"",t.type==="out"?t.amount:"",t.beleg?t.beleg.name:""]));
  aoa.push([],["Summe Monat","","","",ein,aus],["Kassastand Monatsende","","","",uebertrag+ein-aus]);
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,om);
  const xlsxData=XLSX.write(wb,{type:"array",bookType:"xlsx"});
  const done=()=>{clubInfo.lastMonthClosed=om;render();toast("Monatsabschluss "+monthLabel(om)+" exportiert & abgeschlossen");};
  if(typeof JSZip==="undefined"){
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([xlsxData],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"}));
    a.download="monatsabschluss_"+om+".xlsx"; document.body.appendChild(a); a.click(); a.remove();
    done(); return;
  }
  const zip=new JSZip();
  zip.file("monatsabschluss_"+om+".xlsx",xlsxData);
  const folder=zip.folder("belege");
  const fehlend=[];
  mtx.forEach(t=>{
    if(!t.beleg)return;
    if(t.beleg.data){folder.file(t.beleg.name,t.beleg.data.split(",")[1],{base64:true});}
    else fehlend.push(t.beleg.name+" ("+t.text+")");
  });
  zip.file("hinweis.txt","Monatsabschluss "+monthLabel(om)+" – Dorfgemeinschaft Gödersdorf\r\n\r\n"+
    (fehlend.length?"Folgende Belege sind Demo-Einträge ohne hinterlegte Originaldatei:\r\n- "+fehlend.join("\r\n- ")+"\r\n\r\nIm echten Produkt liegen hier alle Original-Uploads.":"Alle verknüpften Belege sind enthalten."));
  const blob=await zip.generateAsync({type:"blob"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="monatsabschluss_"+om+".zip";
  document.body.appendChild(a); a.click(); a.remove();
  done();
}

function txFileChosen(inp){
  const file=inp.files[0]; if(!file)return;
  const rd=new FileReader();
  rd.onload=e=>{
    pendingTxBeleg={name:file.name,data:e.target.result};
    document.getElementById("txUploadLabel").textContent="✓ "+file.name;
    document.getElementById("txUploadZone").classList.add("hasfile");
  };
  rd.readAsDataURL(file);
}
function demoRecognize(){
  if(!pendingTxBeleg){toast("Zuerst einen Beleg anhängen – dann erkennt die Demo die Daten");return;}
  document.getElementById("txText").value="Einkauf lt. Beleg "+pendingTxBeleg.name.replace(/\.[^.]+$/,"");
  document.getElementById("txAmount").value=(Math.round((20+Math.random()*180)*100)/100).toFixed(2);
  document.getElementById("txType").value="out";
  document.getElementById("txCat").value="Veranstaltungen";
  toast("✨ Demo-Erkennung: Formular vorausgefüllt – bitte prüfen & anpassen");
}
function addCC(){
  const n=prompt("Name der Kostenstelle (z. B. „Adventmarkt 2026“):"); if(!n)return;
  const t=prompt("Art (Event / Projekt / laufend):","Event")||"Event";
  costCenters.push({id:Date.now(),name:n,type:t});
  render(); toast("Kostenstelle angelegt");
}
function addTx(){
  const text=document.getElementById("txText").value.trim();
  const amount=parseFloat(document.getElementById("txAmount").value);
  if(!text||!amount){toast("Bitte Text und Betrag angeben");return;}
  transactions.unshift({id:Date.now(),date:"2026-07-12",text,cat:document.getElementById("txCat").value,
    amount,type:document.getElementById("txType").value,cc:+document.getElementById("txCC").value,beleg:pendingTxBeleg});
  pendingTxBeleg=null;
  render(); toast("Buchung erfasst"+(transactions[0].beleg?" – Beleg verknüpft 📎":""));
}
function exportCSV(ccId){
  const tx=(ccId===null?tx2026():transactions.filter(t=>t.cc===ccId));
  const num=n=>n.toFixed(2).replace(".",",");
  let rows=[["Datum","Buchungstext","Kategorie","Kostenstelle","Einnahme (EUR)","Ausgabe (EUR)","Beleg"]];
  [...tx].sort((a,b)=>a.date.localeCompare(b.date)).forEach(t=>rows.push([
    fdate(t.date),t.text,t.cat,ccName(t.cc),t.type==="in"?num(t.amount):"",t.type==="out"?num(t.amount):"",t.beleg?t.beleg.name:""]));
  const ein=tx.filter(t=>t.type==="in").reduce((a,t)=>a+t.amount,0);
  const aus=tx.filter(t=>t.type==="out").reduce((a,t)=>a+t.amount,0);
  rows.push([],["Summe","","","",num(ein),num(aus)],["Ergebnis","","","",num(ein-aus),""]);
  const csv="\uFEFF"+rows.map(r=>r.map(f=>`"${String(f??"").replace(/"/g,'""')}"`).join(";")).join("\r\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
  a.download=(ccId===null?"kassajournal_2026":"nachkalkulation_"+ccName(ccId).toLowerCase().replace(/[^a-z0-9äöüß]+/g,"_"))+".csv";
  document.body.appendChild(a); a.click(); a.remove();
  toast("CSV exportiert – öffnet direkt in Excel");
}

function abschlussView(){
  const start=1250;
  const tx=tx2026();
  const ein=tx.filter(t=>t.type==="in").reduce((s,t)=>s+t.amount,0);

  const cats={};

function exportAbschluss(){
  const start=1250;
  const num=n=>n.toFixed(2).replace(".",",");
  const tx=tx2026();
  const ein=tx.filter(t=>t.type==="in").reduce((s,t)=>s+t.amount,0);
  const aus=tx.filter(t=>t.type==="out").reduce((s,t)=>s+t.amount,0);
  const cats={};
  tx.forEach(t=>{cats[t.cat]=cats[t.cat]||{ein:0,aus:0};cats[t.cat][t.type==="in"?"ein":"aus"]+=t.amount;});
  let rows=[["Jahresabschluss 2026 – Dorfgemeinschaft Gödersdorf"],["Funktionsperiode",clubInfo.dekade],[],
    ["Anfangsbestand","","",num(start)],["Einnahmen gesamt","","",num(ein)],["Ausgaben gesamt","","",num(aus)],["Endbestand","","",num(start+ein-aus)],[],
    ["Kategorie","Einnahmen","Ausgaben","Saldo"]];
  Object.entries(cats).forEach(([c,v])=>rows.push([c,num(v.ein),num(v.aus),num(v.ein-v.aus)]));
  rows.push([],["Kostenstelle","Einnahmen","Ausgaben","Ergebnis"]);
  costCenters.forEach(c=>{const s=ccSums(c.id);if(s.count)rows.push([c.name,num(s.ein),num(s.aus),num(s.erg)]);});
  const csv="\uFEFF"+rows.map(r=>r.map(f=>`"${String(f??"").replace(/"/g,'""')}"`).join(";")).join("\r\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
  a.download="jahresabschluss_2026.csv";
  document.body.appendChild(a); a.click(); a.remove();
  toast("Jahresabschluss exportiert");
}

function terminMonat(){
  const mName=new Date(calYear,calMonth,1).toLocaleDateString("de-AT",{month:"long",year:"numeric"});
  const startDow=(new Date(calYear,calMonth,1).getDay()+6)%7;
  const dim=new Date(calYear,calMonth+1,0).getDate();
  const dimPrev=new Date(calYear,calMonth,0).getDate();
  const evs=filteredEvents();
  let cells="";
  for(let i=0;i<42;i++){
    const dayNum=i-startDow+1;
    let d,other=false;
    if(dayNum<1){d=null;other=true;var show=dimPrev+dayNum;}
    else if(dayNum>dim){d=null;other=true;show=dayNum-dim;}
    else{show=dayNum;d=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(dayNum).padStart(2,"0")}`;}
    const dayEvs=d?evs.filter(e=>e.date===d):[];
    cells+=`<div class="day ${other?"other":""} ${d==="2026-07-12"?"today":""}">
      <div class="n">${show}</div>
      ${dayEvs.map(e=>`<div class="ev" title="${esc(e.title)} · ${e.time} Uhr">${esc(e.title)}</div>`).join("")}
      ${dayEvs.length?`<div class="dot"></div>`:""}
    </div>`;
    if(i>=34 && (i-startDow+2)>dim) break;
  }
  return `<div class="card">
    <div class="row" style="margin-bottom:10px">
      <button class="btn ghost small" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}render()">‹</button>
      <h3 style="margin:0;flex:1;text-align:center">${mName}</h3>
      <button class="btn ghost small" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}render()">›</button>
    </div>
    <div class="cal">
      ${["Mo","Di","Mi","Do","Fr","Sa","So"].map(d=>`<div class="dow">${d}</div>`).join("")}
      ${cells}
    </div>
  </div>`;
}
function terminJahr(){

  document.querySelectorAll(".pAttLbl").forEach(l=>l.style.display=l.dataset.n.includes(q)?"flex":"none");
}
function updAttCount(){
  const n=document.querySelectorAll(".pAtt:checked").length;
  document.getElementById("attCount").textContent=n+" ausgewählt";
}
function addTaskRow(){
  const active=members.filter(m=>m.status==="aktiv");
  const div=document.createElement("div");
  div.className="form-grid"; div.style.marginBottom="10px";
  div.innerHTML=`
    <div style="grid-column:1/-1"><label>Aufgabe</label><input class="tText" placeholder="z. B. Getränke bestellen"></div>

function saveProtocol(){
  const title=document.getElementById("pTitle").value.trim();
  if(!title){toast("Bitte einen Titel angeben");return;}
  const att=[...document.querySelectorAll(".pAtt:checked")].map(c=>+c.value);
  protocols.unshift({id:Date.now(),date:document.getElementById("pDate").value||"2026-07-12",
    title,author:currentUser.name,type:document.getElementById("pType").value,
    vis:document.getElementById("pVis").value,
    loc:document.getElementById("pLoc").value.trim(),
    timeFrom:document.getElementById("pFrom").value,timeTo:document.getElementById("pTo").value,
    att,body:document.getElementById("pBody").value});
  const texts=[...document.querySelectorAll(".tText")],whos=[...document.querySelectorAll(".tWho")],dues=[...document.querySelectorAll(".tDue")];
  let nT=0;
  texts.forEach((t,i)=>{if(t.value.trim()){tasks.push({id:Date.now()+i,text:t.value.trim(),assignee:whos[i].value,due:dues[i].value||null,done:false,src:title,createdBy:currentUser.name,createdAt:"2026-07-12"});nT++;}});
  protoEdit=false;
  render(); toast(`Protokoll gespeichert · ${att.length}× Anwesenheit gezählt${nT?` · ${nT} Aufgabe${nT>1?"n":""} verteilt`:""}`);
}

/* ---------- Aufgaben (Vorstandsübersicht) ---------- */
let taskTab="offen", tfSrc="", tfWho="", tfFrom="", tfTo="";
function createTask(text,who,src,due){
  tasks.push({id:Date.now(),text,assignee:who,due:due||null,done:false,src,createdBy:currentUser.name,createdAt:"2026-07-12"});
}
VIEWS.aufgaben = () => {
  const srcs=[...new Set(tasks.map(t=>t.src))].sort();
  const whos=[...new Set(tasks.map(t=>t.assignee))].sort();
  const filt=t=>(!tfSrc||t.src===tfSrc)&&(!tfWho||t.assignee===tfWho)&&(!tfFrom||(t.due&&t.due>=tfFrom))&&(!tfTo||(t.due&&t.due<=tfTo));
  const offen=tasks.filter(t=>!t.done&&filt(t)).sort((a,b)=>(a.due||"9999").localeCompare(b.due||"9999"));
  const erledigt=tasks.filter(t=>t.done&&filt(t)).sort((a,b)=>(a.due||"9999").localeCompare(b.due||"9999"));
  const list=taskTab==="offen"?offen:erledigt;
  const overdue=offen.filter(t=>t.due&&t.due<"2026-07-12").length;
  const active=members.filter(m=>m.status==="aktiv");
  return `
  <h2 class="view-title">Aufgabenübersicht</h2>
  <p class="view-sub">Alle verteilten Aufgaben aus Sitzungen, Events und Projekten · chronologisch nach Fälligkeit · nur für den Vorstand sichtbar</p>
  ${can("tasks.create")?`<div class="card">
    <h3>➕ Neue Aufgabe erfassen</h3>
    <div class="form-grid" style="grid-template-columns:2fr 1fr;gap:10px">
      <div><label>Aufgabe</label><input id="naText" placeholder="z. B. Bierbank-Transport organisieren"></div>
      <div><label>Zuständig</label><select id="naWho">${active.map(m=>`<option>${esc(m.name)}</option>`).join("")}</select></div>
      <div><label>Zuordnung</label><select id="naSrc">
        <option>Allgemeine Aufgabe</option>
        ${bigEvents.map(ev=>`<option>${esc(ev.name)}</option>`).join("")}
      </select></div>
      <div><label>Fällig bis (optional)</label><input id="naDue" type="date"></div>
    </div>
    <button class="btn small" style="margin-top:4px" onclick="addTaskFromTab()">Aufgabe zuteilen</button>
    <p class="meta" style="margin-top:8px">Die Aufgabe erscheint sofort am Dashboard der zugeteilten Person – im echten Produkt mit Push/E-Mail-Benachrichtigung.</p>
  </div>`:""}
  <div class="row" style="margin-bottom:14px">
    <div class="seg">
      <button class="${taskTab==="offen"?"on":""}" onclick="taskTab='offen';render()">Offen (${tasks.filter(t=>!t.done).length}${overdue?` · ${overdue} überfällig`:""})</button>
      <button class="${taskTab==="erledigt"?"on":""}" onclick="taskTab='erledigt';render()">✓ Erledigt (${tasks.filter(t=>t.done).length})</button>
    </div>
  </div>
  <div class="card" style="padding:14px">
    <div class="form-grid" style="grid-template-columns:1fr 1fr 1fr 1fr;gap:10px">
      <div><label>Event / Quelle</label><select onchange="tfSrc=this.value;render()">
        <option value="">Alle</option>${srcs.map(x=>`<option ${tfSrc===x?"selected":""}>${esc(x)}</option>`).join("")}</select></div>
      <div><label>Person</label><select onchange="tfWho=this.value;render()">
        <option value="">Alle</option>${whos.map(x=>`<option ${tfWho===x?"selected":""}>${esc(x)}</option>`).join("")}</select></div>
      <div><label>Fällig von</label><input type="date" value="${tfFrom}" onchange="tfFrom=this.value;render()"></div>
      <div><label>Fällig bis</label><input type="date" value="${tfTo}" onchange="tfTo=this.value;render()"></div>
    </div>
    ${tfSrc||tfWho||tfFrom||tfTo?`<button class="btn ghost small" style="margin-top:10px" onclick="tfSrc=tfWho=tfFrom=tfTo='';render()">✕ Filter zurücksetzen</button>`:""}
  </div>
  <div class="card">
    ${list.length?`<div class="table-wrap"><table>
      <tr><th>Fällig</th><th>Aufgabe</th><th>Person</th><th>Zuordnung</th><th>${taskTab==="offen"?"Status":"Erledigt am"}</th></tr>
      ${list.map(t=>{const m=memberByName(t.assignee);return `<tr>
        <td class="mono" style="font-size:13px;white-space:nowrap">${t.due?fdate(t.due):"–"}</td>
        <td class="${t.done?"task-done":""}"><b>${esc(t.text)}</b>
          <div class="meta">erstellt von ${esc(t.createdBy||"–")} am ${t.createdAt?fdate(t.createdAt):"–"}</div></td>
        <td><div class="row" style="gap:7px;flex-wrap:nowrap">${avatarHtml(m,28)}${esc(t.assignee)}</div></td>
        <td><span class="pill grey">${esc(t.src)}</span></td>
        <td>${taskTab==="offen"
          ?(!t.due?`<span class="pill grey">ohne Fälligkeit</span>`:t.due<"2026-07-12"?`<span class="pill red">überfällig (${daysSince(t.due)} Tage)</span>`:t.due<="2026-07-19"?`<span class="pill amber">diese Woche</span>`:`<span class="pill grey">geplant</span>`)
          :`<span class="pill green mono" style="font-family:var(--font-mono)">✓ ${t.doneDate?fdate(t.doneDate):"–"}</span>`}</td>
      </tr>`;}).join("")}
    </table></div>`:`<p class="meta">Keine ${taskTab==="offen"?"offenen":"erledigten"} Aufgaben für diese Filter.</p>`}
    <p class="meta" style="margin-top:10px">Abgehakt werden Aufgaben von der zugeteilten Person am eigenen Dashboard – hier behält der Vorstand den Gesamtüberblick.</p>
  </div>`;
};
function addTaskFromTab(){
  const text=document.getElementById("naText").value.trim();
  if(!text){toast("Bitte eine Aufgabe eingeben");return;}
  createTask(text,document.getElementById("naWho").value,document.getElementById("naSrc").value,document.getElementById("naDue").value);
  render(); toast("Aufgabe zugeteilt");
}

    <p style="font-size:14px">Sitzung = 1 Punkt · Auf-/Abbau & Veranstaltung = 2 Punkte. <b>Ab 4 Punkten:</b> −50 % Selbstbehalt beim Vereinsausflug · <b>Ab 6 Punkten:</b> Selbstbehalt entfällt komplett. Die Schwellen und Belohnungen legt der Vorstand fest.</p>

      ${rows.map((r,i)=>`<tr>
        <td class="mono">${i+1}.</td>
        <td><div class="row" style="gap:8px;flex-wrap:nowrap"><div class="avatar-wrap">${avatarHtml(r.m,32)}${jubYears(r.m)?`<div class="medal">${jubYears(r.m)}</div>`:""}</div><b>${esc(r.m.name)}</b>${i===0&&r.pts>0?" 🥇":i===1&&r.pts>0?" 🥈":i===2&&r.pts>0?" 🥉":""}</div></td>

        <td style="text-align:center" class="mono">${r.eins}</td>

        <td>${r.pts>=6?`<span class="pill green">Selbstbehalt entfällt</span>`:r.pts>=4?`<span class="pill amber">−50 % Selbstbehalt</span>`:`<span class="pill grey">–</span>`}</td>

  </div>`;
};

VIEWS.umfragen = () => `
  <h2 class="view-title">Umfragen</h2>
  <p class="view-sub">Jede Person hat eine Stimme pro Umfrage</p>
  ${can("survey.create")?`<button class="btn small" style="margin-bottom:14px" onclick="addSurvey()">+ Umfrage erstellen</button>`:""}
  ${surveys.map(s=>{
    const total=s.options.reduce((n,o)=>n+o.v.length,0)||1;
    const voted=s.voted.includes(currentUser.id);
    return `<div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:10px">
        <h3 style="margin:0">${esc(s.q)}</h3>
        <span class="pill ${s.open?"green":"grey"}">${s.open?"laufend":"beendet"}</span>
      </div>
      ${s.options.map((o,i)=>voted||!s.open?`
        <div style="margin-bottom:10px"><div class="row" style="justify-content:space-between">
          <span style="font-size:14px">${esc(o.t)} ${o.v.includes(currentUser.id)?"· <b>deine Stimme</b>":""}</span>
          <span class="mono" style="font-size:13px">${o.v.length} (${Math.round(o.v.length/total*100)} %)</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${o.v.length/total*100}%"></div></div>
        </div>`:`
        <button class="btn ghost small" style="display:block;width:100%;text-align:left;margin-bottom:8px" onclick="vote(${s.id},${i})">○ ${esc(o.t)}</button>`).join("")}
      <p class="meta">${s.voted.length} von ${members.filter(m=>m.status==="aktiv").length} aktiven Mitgliedern haben abgestimmt</p>
    </div>`;}).join("")}`;
function vote(sid,oi){
  const s=surveys.find(x=>x.id===sid);
  s.options[oi].v.push(currentUser.id); s.voted.push(currentUser.id);
  render(); toast("Stimme gezählt");
}
function addSurvey(){
  const q=prompt("Frage der Umfrage:"); if(!q)return;
  const opts=(prompt("Antwortoptionen, mit Komma getrennt:","Ja,Nein")||"Ja,Nein").split(",").map(t=>({t:t.trim(),v:[]}));
  surveys.unshift({id:Date.now(),q,open:true,options:opts,voted:[]});
  render(); toast("Umfrage erstellt");
}

let pendingFileData=null;
function fileChosen(inp){
  if(inp.files.length){pendingFileName=inp.files[0].name;
    const rd=new FileReader();rd.onload=e=>pendingFileData=e.target.result;rd.readAsDataURL(inp.files[0]);
    document.getElementById("uploadLabel").textContent="✓ "+pendingFileName;
    document.getElementById("uploadZone").classList.add("hasfile");}
}
function submitInvoice(){
  const text=document.getElementById("invText").value.trim();
  const amount=parseFloat(document.getElementById("invAmount").value);
  if(!text||!amount){toast("Bitte Beschreibung und Betrag angeben");return;}
  invoices.unshift({id:Date.now(),by:currentUser.name,date:"2026-07-12",text,amount,file:pendingFileName||"beleg.pdf",fileData:pendingFileData,status:"offen",cc:+document.getElementById("invCC").value});
  pendingFileName=null;pendingFileData=null; render(); toast("Beleg eingereicht – wartet auf Prüfung durch die Kassa");
}
function setInvoice(id,status){
  const i=invoices.find(x=>x.id===id); i.status=status;
  render(); toast(status==="freigegeben"?"Freigegeben – als Nächstes überweisen & abhaken":"Abgelehnt");
}
function payInvoice(id){
  const i=invoices.find(x=>x.id===id); i.status="bezahlt";
  transactions.unshift({id:Date.now(),date:"2026-07-12",text:"Rückerstattung: "+i.text+" ("+i.by+")",cat:"Sonstiges",amount:i.amount,type:"out",cc:i.cc,beleg:{name:i.file,data:i.fileData||null}});
  render(); toast("Als bezahlt markiert & in Kassa verbucht");
}

function closeBigEvent(id){
  const ev=bigEvents.find(x=>x.id===id);
  const open=tasks.filter(t=>t.src===ev.name&&!t.done).length;
  if(open&&!confirm("Achtung: Es sind noch "+open+" Aufgaben zu diesem "+ev.kind+" offen. Trotzdem abschließen?"))return;
  const rep=prompt("Nachbericht / Notizen (optional – Besucherzahlen, Lernpunkte fürs nächste Mal, …):",ev.report||"");
  if(rep===null)return;
  ev.report=rep; ev.status="archiviert"; ev.closedAt="2026-07-12";
  openBigEvent=null; evTab="archiv";
  render(); toast(ev.kind+" abgeschlossen & archiviert");
}
function reopenBigEvent(id){
  const ev=bigEvents.find(x=>x.id===id);
  ev.status="aktiv"; evTab="aktiv";
  render(); toast(ev.kind+" wieder aktiviert");
}
function editReport(id){
  const ev=bigEvents.find(x=>x.id===id);
  const rep=prompt("Nachbericht bearbeiten:",ev.report||""); if(rep===null)return;
  ev.report=rep; render(); toast("Nachbericht gespeichert");
}
function addEventTask(evId){
  const ev=bigEvents.find(x=>x.id===evId);
  const text=prompt("Aufgabe für „"+ev.name+"“:"); if(!text)return;
  const who=prompt("Wer ist zuständig? (Name eines Mitglieds)"); if(!who)return;
  if(!memberByName(who)){toast("Kein Mitglied mit diesem Namen gefunden");return;}
  const due=prompt("Fällig bis (JJJJ-MM-TT, leer = ohne Fälligkeit):","")||null;
  createTask(text,memberByName(who).name,ev.name,due);
  render(); toast("Aufgabe erfasst und „"+ev.name+"“ zugeordnet");
}
function addBigEvent(){
  const n=prompt("Name (z. B. „Jahreskirchtag 2027“ oder „Renovierung Vereinsheim“):"); if(!n)return;
  const kind=confirm("Ist das ein Event (Fest, Veranstaltung)?\n\nOK = Event · Abbrechen = längerfristiges Projekt")?"Event":"Projekt";
  const from=prompt("Beginn (JJJJ-MM-TT):","2026-09-01")||"2026-09-01";
  const to=prompt("Ende (JJJJ-MM-TT):",from)||from;
  bigEvents.unshift({id:Date.now(),kind,name:n,from,to,cc:null,status:"aktiv",report:null,closedAt:null,desc:prompt("Kurzbeschreibung:")||"",subs:[],depts:[]});
  evTab="aktiv";
  render(); toast(kind+" angelegt – jetzt Abteilungen und Subtermine ergänzen");
}
function addSub(evId){
  const ev=bigEvents.find(x=>x.id===evId);
  const t=prompt("Titel des Subtermins (z. B. „Aufbau Tag 1“):"); if(!t)return;
  const d=prompt("Datum (JJJJ-MM-TT):",ev.from)||ev.from;
  ev.subs.push({date:d,time:prompt("Uhrzeit:","16:00")||"16:00",title:t});
  render(); toast("Subtermin angelegt");
}
function addDept(evId){
  const ev=bigEvents.find(x=>x.id===evId);
  const n=prompt("Name der Abteilung (z. B. „Bierbude“):"); if(!n)return;
  const lead=prompt("Wer übernimmt die Leitung? (Name – Mitglied oder externe Person)")||"–";
  ev.depts.push({id:Date.now(),name:n,lead:{name:lead,ext:!memberByName(lead),note:prompt("Vermerk zur Leitung (optional):")||""},crew:[]});
  render(); toast("Abteilung angelegt"+(!memberByName(lead)&&lead!=="–"?" – Leitung als extern erfasst":""));
}
function addPerson(evId,deptId){
  const d=bigEvents.find(x=>x.id===evId).depts.find(x=>x.id===deptId);
  const n=prompt("Name der Person (Mitglied oder externe/r Helfer/in):"); if(!n)return;
  const ext=!memberByName(n);
  d.crew.push({name:n,ext,note:prompt("Vermerk (optional, z. B. Schicht, mitzubringen):")||""});
  render(); toast(ext?"Externe/r Helfer/in eingeteilt":"Mitglied eingeteilt – erscheint am Dashboard");
}
function editNote(evId,deptId,role,ci){
  const d=bigEvents.find(x=>x.id===evId).depts.find(x=>x.id===deptId);
  const p=role==="lead"?d.lead:d.crew[ci];
  const n=prompt("Vermerk für "+p.name+":",p.note); if(n===null)return;
  p.note=n; render(); toast("Vermerk gespeichert");
}
function removePerson(evId,deptId,ci){
  const d=bigEvents.find(x=>x.id===evId).depts.find(x=>x.id===deptId);
  if(!confirm(d.crew[ci].name+" aus der Abteilung entfernen?"))return;
  d.crew.splice(ci,1); render(); toast("Entfernt");
}

/* --- QR-Scan (Handscanner oder Eingabe) --- */
function scanAction(code){
  code=(code||"").trim().toUpperCase();
  if(!code)return;
  const i=items.find(x=>x.invNr.toUpperCase()===code);
  if(!i){toast("Keine Inventarnummer „"+code+"“ gefunden");return;}
  const ov=document.createElement("div");
  ov.className="consent-overlay"; ov.onclick=()=>ov.remove();
  const avail=i.kind==="geraet"?availQty(i):null;
  const myB=i.kind==="geraet"?(i.borrows||[]).find(b=>b.by===currentUser.name):null;
  ov.innerHTML=`<div class="consent-card" style="max-width:420px" onclick="event.stopPropagation()">
    <div class="head"><h3 style="font-family:var(--font-display)">📦 ${esc(i.name)}</h3>
      <p class="meta"><span class="mono">${esc(i.invNr)}</span> · 📍 ${esc(i.loc)}${i.kind==="geraet"&&i.total>1?` · ${avail} von ${i.total} verfügbar`:""}${i.kind==="vorrat"?` · Bestand: ${i.qty} ${esc(i.unit)}`:""}</p>
      ${i.note?`<p class="meta">📝 ${esc(i.note)}</p>`:""}</div>
    <div class="foot">
      <div class="row" style="flex-wrap:wrap;gap:8px">
        ${i.kind==="geraet"?`
          ${avail>0&&!i.defekt?`<button class="btn small" onclick="this.closest('.consent-overlay').remove();borrowItem(${i.id})">Ausborgen</button>`:""}
          ${myB||((i.borrows||[]).length&&can("inventar.manage"))?`<button class="btn small amber" onclick="this.closest('.consent-overlay').remove();returnItem(${i.id})">Zurückbringen</button>`:""}
        `:`
          <button class="btn small" onclick="this.closest('.consent-overlay').remove();changeStock(${i.id},-1)">− Entnahme</button>
          <button class="btn small" onclick="this.closest('.consent-overlay').remove();changeStock(${i.id},1)">+ Zugang</button>
        `}
        <button class="btn ghost small" onclick="this.closest('.consent-overlay').remove();editItemNote(${i.id})">📝 Notiz</button>
        <div class="spacer"></div>
        <button class="btn ghost small" onclick="this.closest('.consent-overlay').remove()">Schließen</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(ov);
  document.getElementById("invScan").value="";
}
function editItemNote(id){
  const i=items.find(x=>x.id===id);
  const n=prompt("Notiz zu „"+i.name+"“:",i.note||""); if(n===null)return;
  i.note=n; histLog(id,"Notiz: "+(n||"(gelöscht)"));
  render(); toast("Notiz gespeichert");
}

      ${qrData?`<img class="qr" src="${qrData}">`:'<div style="font-size:10px;color:#999">QR offline<br>nicht verfügbar</div>'}
    </div>
    <script>setTimeout(()=>window.print(),300)<\/script>
  </body></html>`);

}

/* --- Ausborgen / Zurückbringen mit Stückzahl --- */
function borrowItem(id){
  const i=items.find(x=>x.id===id);
  const avail=availQty(i);
  const res=itemRes(id).find(r=>r.status==="bestätigt" && r.from<="2026-07-12" && r.to>="2026-07-12" && r.by!==currentUser.name);
  if(res && !confirm(`Achtung: „${i.name}" ist aktuell für ${res.by} reserviert (${res.purpose}). Trotzdem ausborgen?`))return;
  let qty=1;
  if(i.total>1){
    qty=parseInt(prompt(`Wie viele Stück ausborgen? (verfügbar: ${avail})`,"1"));
    if(!qty||qty<1)return;
    if(qty>avail){toast("Nur "+avail+" Stk verfügbar");return;}
  } else if(!res && !confirm(`„${i.name}" jetzt ausborgen?`))return;
  const ex=(i.borrows||[]).find(b=>b.by===currentUser.name);
  if(ex)ex.qty+=qty; else i.borrows.push({by:currentUser.name,qty,since:"2026-07-12"});
  histLog(id,(qty>1?qty+" Stk ausgeborgt":"Ausgeborgt"));
  render(); toast((qty>1?qty+" Stk ":"")+"ausgeborgt – gute Verwendung!");
}
function returnItem(id){
  const i=items.find(x=>x.id===id);
  let b=(i.borrows||[]).find(x=>x.by===currentUser.name);
  if(!b&&can("inventar.manage")){
    const who=prompt("Rückgabe für wen erfassen?\n("+i.borrows.map(x=>x.by).join(" / ")+")",i.borrows[0].by);
    b=i.borrows.find(x=>x.by===who);
  }
  if(!b){toast("Keine passende Ausleihe gefunden");return;}
  let qty=b.qty;
  if(b.qty>1){
    qty=parseInt(prompt(`Wie viele Stück bringt ${b.by} zurück? (ausgeborgt: ${b.qty})`,String(b.qty)));
    if(!qty||qty<1||qty>b.qty)return;
  }
  const loc=prompt("Wohin zurückgebracht?\n("+locations.join(" / ")+")",i.loc)||i.loc;
  let defektInfo="";
  if(confirm("Ist etwas defekt oder beschädigt?\n\nOK = ja, Defekt vermerken · Abbrechen = alles in Ordnung")){
    i.defekt=true; i.note=prompt("Was ist defekt?")||"Defekt gemeldet bei Rückgabe";
    defektInfo=", Defekt: "+i.note;
  }
  b.qty-=qty;
  if(b.qty<=0)i.borrows=i.borrows.filter(x=>x!==b);
  i.loc=loc;
  histLog(id,(qty>1?qty+" Stk zurückgebracht":"Zurückgebracht")+" ("+b?.by||currentUser.name+") → "+loc+defektInfo);
  render(); toast("Zurückgebracht → "+loc);
}
function reserveItem(id){
  const i=items.find(x=>x.id===id);
  const from=prompt("Reservieren von (JJJJ-MM-TT):","2026-07-18"); if(!from)return;
  const to=prompt("bis (JJJJ-MM-TT):",from)||from;
  const purpose=prompt("Zweck (z. B. „Privater Geburtstag“ oder „Sommerfest“):")||"–";
  const conflict=itemRes(id).some(r=>r.status==="bestätigt" && from<=r.to && to>=r.from);
  if(conflict && !confirm("Achtung: In diesem Zeitraum gibt es bereits eine bestätigte Reservierung. Trotzdem anfragen?"))return;
  const direct=can("reserve.approve");
  reservations.push({id:Date.now(),itemId:id,by:currentUser.name,from,to,purpose,
    status:direct?"bestätigt":"angefragt",approvedBy:direct?currentUser.name:null});
  histLog(id,direct?`Reservierung/Blockung eingetragen: ${fdate(from)} – ${fdate(to)} (${purpose})`:`Reservierung angefragt: ${fdate(from)} – ${fdate(to)} (${purpose})`);
  render(); toast(direct?"Reservierung eingetragen":"Anfrage gesendet – der Vorstand bestätigt");
}
function setReservation(id,status){
  const r=reservations.find(x=>x.id===id);
  r.status=status; r.approvedBy=currentUser.name;
  histLog(r.itemId,`Reservierung von ${r.by} ${status} (${fdate(r.from)} – ${fdate(r.to)})`);
  render(); toast(status==="bestätigt"?"Reservierung bestätigt":"Reservierung abgelehnt");
}
function reportDefect(id){
  const i=items.find(x=>x.id===id);
  const n=prompt("Was ist defekt an „"+i.name+"“?"); if(!n)return;
  i.defekt=true; i.note=n;
  histLog(id,"Defekt gemeldet: "+n);
  render(); toast("Defekt gemeldet");
}
function fixItem(id){
  const i=items.find(x=>x.id===id);
  i.defekt=false; i.note="";
  histLog(id,"Repariert / wieder einsatzbereit");
  render(); toast("Als repariert markiert");
}
function moveItem(id){
  const i=items.find(x=>x.id===id);
  const loc=prompt("Neuer Standort?\n("+locations.join(" / ")+")",i.loc); if(!loc)return;
  histLog(id,"Standort geändert: "+i.loc+" → "+loc);
  i.loc=loc; render(); toast("Standort aktualisiert");
}
function addItem(){
  const n=prompt("Bezeichnung des Gegenstands:"); if(!n)return;
  const kind=confirm("Ist das ein Vorratsartikel mit Stückzahl (z. B. Getränke)?\n\nOK = Vorrat · Abbrechen = Gerät zum Ausborgen")?"vorrat":"geraet";
  const loc=prompt("Standort?\n("+locations.join(" / ")+")",locations[0])||locations[0];
  const invNr=nextInvNr();
  if(kind==="vorrat"){
    const qty=parseInt(prompt("Anfangsbestand (Stück/Kisten):","1"))||1;
    items.push({id:Date.now(),invNr,name:n,kind,qty,unit:"Stk",loc});
  } else {
    const total=parseInt(prompt("Wie viele Stück gibt es davon? (z. B. 8 Biertischgarnituren)","1"))||1;
    const nid=Date.now();
    items.push({id:nid,invNr,name:n,kind,total,borrows:[],loc,defekt:false,note:""});
    histLog(nid,"In Inventar aufgenommen ("+loc+", "+total+" Stk)");
  }
  render(); toast("Angelegt als "+invNr+" – Etikett über 🏷 drucken");
}
function addLocation(){
  const l=prompt("Neuer Standort (z. B. „Garage Huber“):"); if(!l)return;
  locations.push(l); render(); toast("Standort angelegt");
}
function changeStock(id,dir){
  const i=items.find(x=>x.id===id);
  const n=parseInt(prompt(dir>0?"Wie viele "+i.unit+" kommen dazu?":"Wie viele "+i.unit+" wurden entnommen?","1"));
  if(!n||n<1)return;
  i.qty=Math.max(0,i.qty+dir*n);
  render(); toast(dir>0?"Zugang gebucht":"Entnahme gebucht");
}

      <div><label>Bezeichnung</label><input id="docName" placeholder="z. B. Versicherungspolizze 2027"></div>

  <div class="card">
    ${docs.map(d=>`<div class="list-item">
      <div class="avatar">📄</div>
      <div style="flex:1"><b>${esc(d.name)}</b>
        <div class="meta"><span class="pill grey">${esc(d.cat)}</span> abgelegt von ${esc(d.by)} am ${fdate(d.date)} · 📎 ${esc(d.file.name)}</div></div>
      <div class="row" style="gap:6px">

      </div>
    </div>`).join("")||`<p class="meta">Keine Dokumente in dieser Kategorie.</p>`}
  </div>`;
};
let pendingDoc=null;
function docFileChosen(inp){
  const file=inp.files[0]; if(!file)return;
  const rd=new FileReader();
  rd.onload=e=>{
    pendingDoc={name:file.name,data:e.target.result};
    document.getElementById("docLabel").textContent="✓ "+file.name;
    document.getElementById("docZone").classList.add("hasfile");
    const nm=document.getElementById("docName");
    if(!nm.value)nm.value=file.name.replace(/\.[^.]+$/,"").replace(/[_-]/g," ");
  };
  rd.readAsDataURL(file);
}
function uploadDoc(){
  const name=document.getElementById("docName").value.trim();
  if(!name){toast("Bitte eine Bezeichnung angeben");return;}
  documents.unshift({id:Date.now(),name,cat:document.getElementById("docCat").value,by:currentUser.name,date:"2026-07-12",file:pendingDoc||{name:"dokument.pdf",data:null}});
  pendingDoc=null; render(); toast("Dokument abgelegt");
}
function viewDoc(id){
  const d=documents.find(x=>x.id===id);
  if(!d.file.data){toast("Demo-Dokument „"+d.file.name+"“ – kein Original hinterlegt");return;}
  const ov=document.createElement("div");
  ov.className="consent-overlay"; ov.onclick=()=>ov.remove();
  const isImg=d.file.data.startsWith("data:image");
  ov.innerHTML=`<div class="consent-card" style="max-width:720px" onclick="event.stopPropagation()">
    <div class="head"><h3 style="font-family:var(--font-display)">📄 ${esc(d.name)}</h3>
      <p class="meta">${esc(d.cat)} · ${esc(d.by)} · ${fdate(d.date)}</p></div>
    <div class="body" style="padding-bottom:16px;text-align:center">
      ${isImg?`<img src="${d.file.data}" style="max-width:100%;border-radius:10px;border:1px solid var(--line)">`
        :`<iframe src="${d.file.data}" style="width:100%;height:65vh;border:1px solid var(--line);border-radius:10px"></iframe>`}
    </div>
    <div class="foot"><div class="row">
      <a class="btn ghost small" style="text-decoration:none" href="${d.file.data}" download="${esc(d.file.name)}">⬇ Herunterladen</a>
      <div class="spacer"></div><button class="btn small" onclick="this.closest('.consent-overlay').remove()">Schließen</button></div></div>
  </div>`;
  document.body.appendChild(ov);
}
function deleteDoc(id){
  const d=documents.find(x=>x.id===id);
  if(!confirm("„"+d.name+"“ wirklich löschen?"))return;
  documents=documents.filter(x=>x.id!==id);
  render(); toast("Dokument gelöscht");
}

  ${can("keylog.upload")&&due?`<div class="notice">⏰ <b>Schloss auslesen fällig!</b> Letzter Protokoll-Upload vor ${daysSince(clubInfo.lastKeyLog)} Tagen (Intervall: ${clubInfo.keyIntervalDays} Tage). Bitte EVVA-App auslesen und Datei unten hochladen.</div>`:""}
  <div class="grid2">

          <td class="mono" style="font-size:13px">${esc(k.nr)}</td>

    </div>
    <div>
      ${can("keylog.upload")?`<div class="card">
        <h3>⏰ Auslese-Erinnerung</h3>
        <p style="font-size:14px">Letzter Upload: <b class="mono">${fdate(clubInfo.lastKeyLog)}</b> (vor ${daysSince(clubInfo.lastKeyLog)} Tagen)</p>
        <div class="row" style="margin-top:8px">
          <label style="font-size:13.5px;font-weight:600">Erinnerung alle</label>
          <input type="number" min="1" value="${clubInfo.keyIntervalDays}" style="width:70px;padding:7px;border:1px solid var(--line);border-radius:8px" onchange="setKeyInterval(this.value)">
          <span style="font-size:13.5px">Tage</span>

          📎 EVVA-Export auswählen (.xls / .xlsx / .csv)
        </label>
        ${keyUploads.length?`<p class="meta" style="margin-top:8px">Bisherige Uploads: ${keyUploads.map(u=>`${esc(u.file)} (${fdate(u.date)}, ${u.rows} Zeilen)`).join(" · ")}</p>`:""}
      </div>`:""}
      <div class="card">

        <div class="table-wrap"><table>
          <tr><th>Datum</th><th>Uhrzeit</th><th>Chip / Person</th><th>Ereignis</th></tr>

            <td class="mono" style="font-size:13px">${esc(l.date.includes("-")?fdate(l.date):l.date)}</td>

        <p class="meta" style="margin-top:8px">${keyLog.length} Einträge gesamt · Quelle: Export aus der Schloss-App, hochgeladen durch den Systemadmin.</p>

function assignChip(){
  const name=prompt("Welchem Mitglied wird ein Chip zugewiesen? (Name)"); if(!name)return;
  const m=memberByName(name);
  if(!m){toast("Kein Mitglied mit diesem Namen gefunden");return;}
  if(hasChip(m.id)){toast(m.name+" hat bereits einen Chip");return;}
  const nr=prompt("Chip-Nummer:","CHIP-0"+(keyChips.length+1))||"CHIP-?";
  keyChips.push({mid:m.id,nr,since:"2026-07-12"});
  render(); toast("Chip "+nr+" an "+m.name+" ausgegeben");
}
function revokeChip(mid){
  const m=members.find(x=>x.id===mid);
  if(!confirm("Chip von "+m.name+" wirklich entziehen?"))return;
  keyChips=keyChips.filter(k=>k.mid!==mid);
  render(); toast("Chip entzogen");
}
function setKeyInterval(v){
  const n=parseInt(v); if(!n||n<1)return;
  clubInfo.keyIntervalDays=n; render(); toast("Erinnerungsintervall: alle "+n+" Tage");
}
function uploadKeyLog(inp){
  const file=inp.files[0]; if(!file)return;
  const finish=(rows)=>{
    keyUploads.unshift({date:"2026-07-12",file:file.name,rows:rows.length});
    clubInfo.lastKeyLog="2026-07-12";
    rows.forEach(r=>keyLog.unshift(r));
    render(); toast(rows.length+" Zutritte importiert – Erinnerung zurückgesetzt");
  };
  if(typeof XLSX==="undefined"){finish([]);return;}
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:"array"});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,raw:false});
      const parsed=rows.filter(r=>r&&r.length>=2&&String(r[0]).match(/\d/))
        .map(r=>({date:String(r[0]||""),time:String(r[1]||""),who:String(r[2]||"unbekannt"),ev:String(r[3]||"Tür geöffnet")}));
      finish(parsed);
    }catch(err){console.error(err);finish([]);toast("Datei konnte nicht gelesen werden – bitte Format prüfen");}
  };
  reader.readAsArrayBuffer(file);
}

VIEWS.rollen = () => `

  <div class="card"><div class="table-wrap"><table class="perm-grid">
    <tr><th>Berechtigung</th>${Object.values(ROLES).map(r=>`<th style="text-align:center">${r.label}</th>`).join("")}</tr>
    ${Object.entries(PERM_LABELS).map(([p,label])=>`<tr>
      <td>${label}</td>
      ${Object.keys(ROLES).map(r=>{
        const on=ROLES[r].perms.includes(p);
        const lock=r==="admin";
        return `<td style="text-align:center">${can("roles.manage")&&!lock
          ?`<button style="border:none;background:none;cursor:pointer;font-size:15px" title="Klicken zum Umschalten" onclick="togglePerm('${r}','${p}')">${on?'<span class="check">✓</span>':'<span class="cross">–</span>'}</button>`
          :(on?'<span class="check">✓</span>':'<span class="cross">–</span>')}</td>`;
      }).join("")}
    </tr>`).join("")}
  </table></div>
  <p class="meta" style="margin-top:12px">Beispiel eurer Konfiguration: Obmann hat überall <b>Einsicht</b> (Kassa, alle Belege, Schlüssel, Rollen), bearbeitet aber nur, was auch ein Mitglied darf – mit Ausnahme der <b>Freigabe von Leihartikeln/Reservierungen</b>. Der Systemadmin ist fix mit allen Rechten ausgestattet (nicht änderbar). Im echten Produkt ist die Matrix pro Verein frei konfigurierbar und versioniert.</p>
  </div>`;
function togglePerm(role,perm){
  if(!can("roles.manage"))return;
  const arr=ROLES[role].perms;
  const i=arr.indexOf(perm);
  if(i>=0)arr.splice(i,1);else arr.push(perm);
  render(); toast(ROLES[role].label+": „"+PERM_LABELS[perm]+"“ "+(i>=0?"entzogen":"erteilt"));
}
